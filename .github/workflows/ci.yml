name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zero
          POSTGRES_PASSWORD: zero
          POSTGRES_DB: zero_dao_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://zero:zero@localhost:5432/zero_dao_test
        run: npx prisma generate

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://zero:zero@localhost:5432/zero_dao_test
        run: npx prisma migrate deploy

      - name: Build
        env:
          DATABASE_URL: postgresql://zero:zero@localhost:5432/zero_dao_test
          ANTHROPIC_API_KEY: sk-placeholder
        run: npm run build
